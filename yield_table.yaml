# ──────────────────────────────────────────────────────────────
# LocaGenius — エリア別想定利回りテーブル
#
# 出典：
#   健美家「収益物件 市場動向マンスリーレポート」2025年10月期
#   健美家「2025年下半期 政令指定都市 住宅系収益不動産 高利回りランキング」
#   https://www.kenbiya.com/ar/ns/research/kenbiya_report/
#
# 更新方法：
#   このファイルを直接編集するだけでコード変更不要。
#   利回りの単位は「%」（表面利回り）。
#
# 種別：
#   kubun  … 区分マンション（専有面積単位で売買・賃貸される物件）
#   ittou  … 一棟アパート・一棟マンション（建物まるごと）
#   ※ 立地調査（モード①②）では kubun を使用して推定月額賃料を算出する
#
# エリア判定ルール：
#   areas リストを上から順に評価し、最初にマッチしたエントリを使用する。
#   required が指定されている場合は、そのキーワードも住所に含まれている必要がある。
#   keywords のいずれか1つが住所に含まれていればマッチ。
# ──────────────────────────────────────────────────────────────

areas:

  # ── 東京都 ──────────────────────────────────────────────────

  - label: "都心3区"
    required: "東京"
    keywords:
      - "千代田区"
      - "中央区"
      - "港区"
    kubun: 3.5   # 区分マンション（健美家2025：東京都心ワンルーム ~4.2%）
    ittou: 4.0   # 一棟アパート・マンション

  - label: "東京城南・城西"
    required: "東京"
    keywords:
      - "渋谷区"
      - "新宿区"
      - "目黒区"
      - "品川区"
      - "世田谷区"
      - "杉並区"
      - "中野区"
    kubun: 4.0
    ittou: 5.0

  - label: "東京城東・城北"
    required: "東京"
    keywords:
      - "江東区"
      - "墨田区"
      - "江戸川区"
      - "葛飾区"
      - "荒川区"
      - "足立区"
      - "北区"
      - "板橋区"
      - "練馬区"
      - "大田区"
      - "文京区"
      - "台東区"
      - "豊島区"
    kubun: 4.5
    ittou: 5.5

  - label: "東京23区外・多摩"
    keywords:
      - "東京"
    kubun: 5.5
    ittou: 6.5

  # ── 神奈川県 ─────────────────────────────────────────────────

  - label: "横浜市"
    keywords:
      - "横浜市"
    kubun: 4.5
    ittou: 6.0

  - label: "川崎市"
    keywords:
      - "川崎市"
    kubun: 4.5
    ittou: 6.0

  - label: "相模原市"
    keywords:
      - "相模原市"
    kubun: 6.0
    ittou: 7.0

  # ── 埼玉県 ───────────────────────────────────────────────────

  - label: "さいたま市"
    keywords:
      - "さいたま市"
    kubun: 5.5
    ittou: 6.5
    # 健美家2025：さいたま市 一棟アパート 6.64%（政令指定都市最低水準）

  # ── 千葉県 ───────────────────────────────────────────────────

  - label: "千葉市"
    keywords:
      - "千葉市"
    kubun: 6.0
    ittou: 7.0

  # ── 大阪府 ───────────────────────────────────────────────────

  - label: "大阪市中心部"
    required: "大阪市"
    keywords:
      - "北区"
      - "中央区"
      - "浪速区"
      - "西区"
      - "天王寺区"
    kubun: 4.5
    ittou: 5.5

  - label: "大阪市その他"
    keywords:
      - "大阪市"
    kubun: 5.0
    ittou: 6.5

  - label: "大阪府その他"
    keywords:
      - "堺市"
      - "大阪府"
      - "大阪"
    kubun: 6.0
    ittou: 7.5

  # ── 京都・兵庫 ──────────────────────────────────────────────

  - label: "京都市"
    keywords:
      - "京都市"
    kubun: 5.5
    ittou: 7.0

  - label: "神戸市"
    keywords:
      - "神戸市"
    kubun: 5.5
    ittou: 7.0

  # ── 愛知県 ───────────────────────────────────────────────────

  - label: "名古屋市"
    keywords:
      - "名古屋市"
    kubun: 5.5
    ittou: 7.0
    # 健美家2025：名古屋市 一棟アパート 13位（前回18位から上昇）

  # ── 政令指定都市（個別）────────────────────────────────────

  - label: "札幌市"
    keywords:
      - "札幌市"
    kubun: 6.5
    ittou: 8.0

  - label: "仙台市"
    keywords:
      - "仙台市"
    kubun: 6.5
    ittou: 8.0

  - label: "新潟市"
    keywords:
      - "新潟市"
    kubun: 8.0
    ittou: 10.0
    # 健美家2025下半期1位：区分16.37%、アパート13.18%、マンション11.20%

  - label: "静岡市"
    keywords:
      - "静岡市"
    kubun: 7.0
    ittou: 8.5

  - label: "浜松市"
    keywords:
      - "浜松市"
    kubun: 7.0
    ittou: 8.5
    # 健美家2025：区分16.05%（2位）、アパート10.60%（3位）

  - label: "岡山市"
    keywords:
      - "岡山市"
    kubun: 7.0
    ittou: 8.5
    # 健美家2025：一棟マンション10.45%（2位）

  - label: "広島市"
    keywords:
      - "広島市"
    kubun: 6.5
    ittou: 8.0
    # 健美家2025：一棟マンション利回り上昇が全都市最大（+1.13pt）

  - label: "北九州市"
    keywords:
      - "北九州市"
    kubun: 7.5
    ittou: 10.0
    # 健美家2025：区分15.86%（3位）、アパート12.70%（2位）

  - label: "福岡市"
    keywords:
      - "福岡市"
    kubun: 5.5
    ittou: 7.0
    # 健美家2025：一棟マンション最低利回り（平均価格2億7千万円）

  - label: "熊本市"
    keywords:
      - "熊本市"
    kubun: 7.0
    ittou: 8.5

# ── デフォルト（マッチしなかった場合）──────────────────────────
default:
  label: "その他地方"
  kubun: 7.5
  ittou: 9.0

# ── 物件補正 ────────────────────────────────────────────────────
corrections:
  tower_mansion:
    keywords:
      - "タワー"
      - "TOWER"
      - "tower"
      - "超高層"
    adjustment: -0.5   # タワーマンションは人気・流動性高のため利回り低め
